<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VibeCal</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #1a1a26;
      --text: #f5f5fa;
      --muted: #9aa0b0;
      --accent: #22d3ee;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      text-align: center;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #22d3ee, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0 0 0.5rem 0;
      font-weight: 800;
    }
    .tagline {
      color: var(--muted);
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }
    .links a {
      color: var(--text);
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      background: var(--surface);
      border-radius: 12px;
      font-weight: 600;
      min-width: 240px;
      transition: background 0.15s;
    }
    .links a:hover {
      background: #22222f;
    }
    footer {
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.875rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>VibeCal</h1>
    <p class="tagline">Your AI calorie coach.</p>

    <div class="links">
      <a href="./support.html">Support</a>
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Service</a>
    </div>

    <footer>
      <p>Contact: <a href="mailto:Ahmad.ahmad021117@gmail.com">Ahmad.ahmad021117@gmail.com</a></p>
    </footer>
  </div>
</body>
</html>
