included:
  - VibeNutrition
  - VibeNutritionTests

excluded:
  - VibeNutrition.xcodeproj
  - .build
  - DerivedData
  - Packages

disabled_rules:
  - trailing_comma          # mixes badly with multi-line SwiftUI modifier chains
  - multiple_closures_with_trailing_closure
  - opening_brace           # SwiftUI ViewBuilders make this noisy

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - vm
    - r
    - g
    - b
    - f
    - p
    - s
    - t
    - c
    - m
