included:
  - VibeNutrition
  - VibeNutritionTests

excluded:
  - VibeNutrition.xcodeproj
  - .build
  - DerivedData
  - Packages

disabled_rules:
  - trailing_comma          # mixes badly with multi-line SwiftUI modifier chains
  - multiple_closures_with_trailing_closure
  - opening_brace           # SwiftUI ViewBuilders make this noisy
  - large_tuple             # services return small structured tuples on purpose
  - non_optional_string_data_conversion  # tests use literal `.data(using: .utf8)!`
  - nesting                 # service-internal Decodable rows want to nest a `Row` type
  - implicit_optional_initialization     # `var foo: Foo? = nil` reads more clearly in view structs
  - colon                   # we sometimes align dict-literal values for readability

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

line_length:
  warning: 160
  error: 220
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 500
  error: 700

file_length:
  warning: 600
  error: 900
  ignore_comment_only_lines: true

function_body_length:
  warning: 100
  error: 140

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 1     # single-letter locals (`v`, `d`, `n`, `a`) are common in closures
  excluded:
    - id
    - vm
    - r
    - g
    - b
    - f
    - p
    - s
    - t
    - c
    - m
    - v
    - d
    - n
    - a
    - o
    - qa
    - to
    # snake_case JSON keys (kept as variable names in throwaway Decodable Row structs)
    - logged_at
    - exported_at
    - food_logs
    - weight_logs
    - image_path
