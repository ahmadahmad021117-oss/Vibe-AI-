name: VibeNutrition
options:
  bundleIdPrefix: com.vibecal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  xcodeVersion: "2630"
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Code signing: automatic, team picked up from the DEVELOPMENT_TEAM env var
    # at xcodegen time. Locally Xcode falls back to your personal team after
    # you sign in at Xcode → Settings → Accounts. CI must export
    # DEVELOPMENT_TEAM=<your-10-char-team-id> before running `xcodegen` and
    # `fastlane beta`. CI overrides signing entirely with
    # CODE_SIGNING_ALLOWED=NO via the build invocation.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
configs:
  Debug: debug
  Release: release
fileGroups:
  - Configuration
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
targets:
  VibeNutrition:
    type: application
    platform: iOS
    sources:
      - path: VibeNutrition
    resources:
      - path: VibeNutrition/Resources
    info:
      path: VibeNutrition/Info.plist
      properties:
        CFBundleDisplayName: VibeCal
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIUserInterfaceStyle: Dark
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: VibeCal uses the camera to scan your meals and estimate calories.
        NSPhotoLibraryUsageDescription: VibeCal lets you pick meal photos from your library to log food.
        NSHealthShareUsageDescription: VibeCal reads steps, active energy, and weight to personalize your daily calorie target.
        NSHealthUpdateUsageDescription: VibeCal can write weight and nutrition entries to Apple Health if you opt in.
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - vibecal
    entitlements:
      path: VibeNutrition/VibeNutrition.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
    dependencies:
      - package: Supabase
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibecal.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  VibeNutritionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VibeNutritionTests
    dependencies:
      - target: VibeNutrition
schemes:
  VibeNutrition:
    build:
      targets:
        VibeNutrition: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeNutritionTests
    archive:
      config: Release
