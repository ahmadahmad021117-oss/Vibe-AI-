name: VibeNutrition
options:
  bundleIdPrefix: com.vibe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
configs:
  Debug: debug
  Release: release
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 4.43.0
targets:
  VibeNutrition:
    type: application
    platform: iOS
    sources:
      - path: VibeNutrition
    resources:
      - path: VibeNutrition/Resources
    info:
      path: VibeNutrition/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIUserInterfaceStyle: Dark
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Vibe uses the camera to scan your meals and estimate calories.
        NSPhotoLibraryUsageDescription: Vibe lets you pick meal photos from your library to log food.
        NSHealthShareUsageDescription: Vibe reads steps and active energy to personalize your daily calorie target.
        NSHealthUpdateUsageDescription: Vibe can write nutrition entries to Apple Health if you opt in.
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - vibenutrition
    entitlements:
      path: VibeNutrition/VibeNutrition.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
    dependencies:
      - package: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibe.nutrition
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  VibeNutritionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VibeNutritionTests
    dependencies:
      - target: VibeNutrition
schemes:
  VibeNutrition:
    build:
      targets:
        VibeNutrition: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeNutritionTests
    archive:
      config: Release
