name: iOS build + test

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen + SwiftLint
        run: brew install xcodegen swiftlint

      - name: Lint
        run: swiftlint --strict --quiet

      - name: Seed Secrets.plist (CI placeholder)
        run: |
          cat > VibeNutrition/Resources/Secrets.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>SUPABASE_URL</key><string>https://ci.example.supabase.co</string>
            <key>SUPABASE_ANON_KEY</key><string>ci-placeholder</string>
            <key>GOOGLE_CLIENT_ID</key><string>ci.apps.googleusercontent.com</string>
            <key>REVENUECAT_API_KEY</key><string>ci-placeholder</string>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VibeNutrition.xcodeproj \
            -scheme VibeNutrition

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project VibeNutrition.xcodeproj \
            -scheme VibeNutrition \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project VibeNutrition.xcodeproj \
            -scheme VibeNutrition \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty
