name: iOS build + test

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        # The project is generated by XcodeGen at objectVersion 77 (Xcode 16+),
        # so CI must run on a current Xcode. Pick the newest installed rather
        # than pinning a version that drifts out of date.
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install XcodeGen + SwiftLint
        run: brew install xcodegen swiftlint

      - name: Lint
        run: swiftlint --strict --quiet

      - name: Seed Secrets.plist (CI placeholder)
        run: |
          cat > VibeNutrition/Resources/Secrets.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>SUPABASE_URL</key><string>https://ci.example.supabase.co</string>
            <key>SUPABASE_ANON_KEY</key><string>ci-placeholder</string>
            <key>GOOGLE_CLIENT_ID</key><string>ci.apps.googleusercontent.com</string>
            <key>REVENUECAT_API_KEY</key><string>ci-placeholder</string>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VibeNutrition.xcodeproj \
            -scheme VibeNutrition

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project VibeNutrition.xcodeproj \
            -scheme VibeNutrition \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          set -o pipefail
          SIM=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+( Pro)?( Max)?' | sort -u | tail -1)
          echo "Testing on: $SIM"
          xcodebuild test \
            -project VibeNutrition.xcodeproj \
            -scheme VibeNutrition \
            -destination "platform=iOS Simulator,name=$SIM,OS=latest" \
            CODE_SIGNING_ALLOWED=NO
